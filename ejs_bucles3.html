<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <p id="sumarhasta100"></p>

    <script>
        //Suma hasta un límite: crea un programa que pida dos números al usuario y los sume continuamente hasta que el total sea mayor que 100. Añade cuantas veces se ha repetido la suma. Como ejemplo prueba con los valores de 5 y 5, debe dar 100 y repetirse 10 veces



        let a = prompt("Escribe un número: ");
        a=Number(a);

        let b = prompt("Escribe un número: ");
        b=Number(b);
        let suma = 0;
        let contador = 0;
        while (suma<100) {
            suma = suma + a + b;
            contador++;
        }
        console.log(suma);
        console.log(contador);
        document.getElementById ("sumarhasta100").innerHTML=("La suma repetida < 100   de " + a + " y " + b + " es " + suma + " y se ha repetido " + contador + " veces ");
    </script>
</body>
</html>
