<!DOCTYPE html>
 <html lang="es-ES">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>getElementsByTagName</title>
 </head>
 
 <body style="border: solid green 3px">
        <p>Algo de texto</p>
        <p>Algo de texto</p>
    
        <div id="div1" style="border: solid blue 3px">
          <p>Algo de texto en div1</p>
          <p>Algo de texto en div1</p>
          <p>Algo de texto en div1</p>
    
          <div id="div2" style="border: solid red 3px">
            <p>Algo de texto en div2</p>
            <p>Algo de texto en div2</p>
          </div>

        </div>
    
        <p>Algo de texto</p>
        <p>Algo de texto</p>
    
        <button onclick="getAllParrElems();"> 
          muestra todos los elementos p en el documento</button><br />
    
        <button onclick="div1ParrElems();">
          muestra todos los elementos p en div1</button><br />
    
        <button onclick="div2ParrElems();">
          muestra todos los elementos p en div2</button>


        <script>

            //cuenta los párrafos de todo el body
            function getAllParrElems() {

              let allParr = document.getElementsByTagName("p");
              let num = allParr.length;
              alert("Hay " + num + " <p> elementos en este documento");

              /*
              console.log("allParr:", allParr);
              console.log("num:", num);
              debugger; */
           
            }
      
            //cuenta los párrafos de div1
            function div1ParrElems() {
              let div1 = document.getElementById("div1");
              let div1Parr = div1.getElementsByTagName("p");
      
              let num = div1Parr.length;
            
              alert("Hay " + num + " <p> elementos en el elemento div1");
              
                /*
              console.log("div1:", div1);
              console.log("div1Parr", div1Parr);
              debugger; */
              
              
            }
      
            //cuenta los párrafos de div2
            function div2ParrElems() {
              let div2 = document.getElementById("div2");
              let div2Parr = div2.getElementsByTagName("p");
      
              let num = div2Parr.length;
            
              alert("Hay " + num + " <p> elementos en el elemento div2");
              /*
              console.log("div2:", div2);
              console.log("div2Parr", div2Parr);
              debugger; */
            
            }
        </script>


 </body>
 </html>
